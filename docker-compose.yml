# Consigue tu secret key en https://playit.gg
services:
  mc:
    image: itzg/minecraft-server
    container_name: mc_server
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565/tcp"
      - "19132:19132/udp"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "12G"
      TZ: "America/Mexico_City"
      ENABLE_RCON: "FALSE"
      CREATE_CONSOLE_IN_PIPE: "true"
    volumes:
      - ./data:/data

  tunnel:
    image: ghcr.io/playit-cloud/playit-agent:0.16
    container_name: playit_agent
    restart: unless-stopped
    network_mode: host
    environment:
      - SECRET_KEY=${PLAYIT_SECRET_KEY}

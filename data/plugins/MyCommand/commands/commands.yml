clear_chat:
  command: /clr
  type: BROADCAST_TEXT
  text:
  - '%Repeat%100% '

colors:
  command: /color
  register: true
  type: TEXT
  text:
  - "&a&l-- colores --"
  - "&r&&r0: &0Black          &r&&rf: &fWhite"
  - "&r&&r4: &4Dk Red        &r&&rc: &cLt red"
  - "&r&&r6: &6Dk Yellow     &r&&re: &eLt Yellow"
  - "&r&&r2: &2Dk Green     &r&&ra: &aLt Green"
  - "&r&&r3: &3Dk Cyan      &r&&rb: &bLt Cyan"
  - "&r&&r1: &1Dk Blue       &r&&r9: &9Lt Blue"
  - "&r&&r5: &5Dk Magenta  &r&&rd: &dLt Magenta"
  - "&r&&r8: &8Dk Gray      &r&&r7: &7Lt Gray"
  - "&r&&rk: &kkkkk           &r&&rr: &rReset"
  - "&r&&rm: &mStkThrgh&r     &r&&rn: &nUnderline"
  - "&r&&ro: &oItalic          &r&&rl: &lBold"
  permission-required: colors

prot:
  command: /prot
  register: true
  type: ICON_MENU
  iconmenu_title: '&3Tienda de Protecciones'
  iconmenu_size: 54
  iconmenu_commands:
    # Formato: /ps_comprar [Material] [Precio]
    - '11:YELLOW_GLAZED_TERRACOTTA:0:/ps_comprar YELLOW_GLAZED_TERRACOTTA 50:&a&lProtección 8x8:&eCosto 50;&7Radio de 8x8'
    - '12:GREEN_GLAZED_TERRACOTTA:0:/ps_comprar GREEN_GLAZED_TERRACOTTA 100:&a&lProtección 16x16:&eCosto 100;&7Radio de 16x16'
    - '13:LIGHT_BLUE_GLAZED_TERRACOTTA:0:/ps_comprar LIGHT_BLUE_GLAZED_TERRACOTTA 250:&a&lProtección 32x32:&eCosto 250;&7Radio de 32x32'
    - '14:PURPLE_GLAZED_TERRACOTTA:0:/ps_comprar PURPLE_GLAZED_TERRACOTTA 500:&a&lProtección 64x64:&eCosto 500;&7Radio de 64x64'
    - '15:BLACK_GLAZED_TERRACOTTA:0:/ps_comprar BLACK_GLAZED_TERRACOTTA 1000:&a&lProtección 128x128:&eCosto 1000;&7Radio de 128x128'
    - '53:BARRIER:0:%close%:&c&lCerrar Menú:&7Click para salir'
  permission-required: false

ps_comprar:
  command: /ps_comprar
  type: RUN_CONSOLE
  runcmd:
    - "$Script$%if%$money<$arg2"
    - "$text$&c&lProtecciones &8» &7No tienes suficiente dinero ($$arg2)."
    - "$Script$%else%"
    - "/money remove $player $arg2"
    - "/ps give $arg1 $player"
    - "$text$&a&l¡Compra exitosa! &7Has recibido una protección de tipo &e$arg1&7."
  permission-required: false


# WelcomeMat Configuration
config-version: '1.3'

# Available sounds (1.13+):
# - BLOCK_NOTE_BLOCK_PLING
# - BLOCK_NOTE_BLOCK_CHIME
# - BLOCK_NOTE_BLOCK_BELL
# - BLOCK_NOTE_BLOCK_BASS
# - ENTITY_PLAYER_LEVELUP
# - ENTITY_EXPERIENCE_ORB_PICKUP
# - BLOCK_ANVIL_LAND
# - ENTITY_VILLAGER_YES
# - ENTITY_VILLAGER_NO
# - AMBIENT_DESERT_ADDITIONS
# - AMBIENT_BADLANDS_ADDITIONS

features:
  join-message: true
  leave-message: true
  join-title: true
  join-sound: true
  leave-sound: false
  other-players-sounds: true

messages:
  use-packs:
    join: false
    leave: false
    splash: false
  join:
  - '&e%player% &aEntro al Servidor!'
  leave:
  - '&e%player% &cSalio del Servidor!'

# Titles and Subtitles (Supports %player%)
titles:
  join:
    title: '&6Hola %player%!'
    subtitle: '&eDisfruta del servidor :D'

sounds:
  join:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0
  leave:
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 0.5
    pitch: 1.0

effects:
  enabled: true # Global toggle for join effects
  # Animation selection: when set to "pack" the active message pack decides the animation.
  # Set to "custom" to always use the default animation below.
  animation:
    source: pack # pack | custom
    default: fire_spiral # Fallback animation id when no pack animation exists
  # Legacy particle options (kept for backward compatibility, no longer used by default)
  type: SPIRAL # SPIRAL, HELIX, FOUNTAIN, BURST
  duration: 3 # Duration in seconds
  particles:
    primary: FIREWORK
    secondary: SPELL_WITCH
  colors:
  - RED
  - YELLOW
  - BLUE
delays:
  join: 0
  welcome: 1000
  title: 500
analytics:
  enabled: true
message-packs:
  selected: default
